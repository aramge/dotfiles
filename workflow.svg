<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <style>
    .title { font-family: monospace; font-size: 20px; font-weight: bold; }
    .ws { fill: #f8f8f8; stroke: #333; stroke-width: 2; }
    .ws-title { font-family: monospace; font-size: 16px; font-weight: bold; }
    .app { fill: #fff; stroke: #666; stroke-width: 1; }
    .text { font-family: monospace; font-size: 14px; }
    .subtext { font-family: monospace; font-size: 12px; fill: #555; }
  </style>
  
  <rect class="ws" x="20" y="50" width="270" height="320" rx="5" />
  <rect class="ws" x="310" y="50" width="270" height="320" rx="5" />
  <rect class="ws" x="600" y="50" width="270" height="320" rx="5" />

  <text x="450" y="30" text-anchor="middle" class="title">xmonad + tmux Workflow</text>
  <text x="155" y="80" text-anchor="middle" class="ws-title">Workspace 1</text>
  <text x="445" y="80" text-anchor="middle" class="ws-title">Workspace 2</text>
  <text x="735" y="80" text-anchor="middle" class="ws-title">Workspace 3</text>

  <text x="155" y="110" text-anchor="middle" class="text">GUI Applications</text>
  <rect class="app" x="40" y="130" width="230" height="80" />
  <text x="155" y="175" text-anchor="middle" class="text">Browser / FreeCAD</text>

  <text x="445" y="110" text-anchor="middle" class="text">Local (mnixos)</text>
  <rect class="app" x="330" y="130" width="230" height="220" />
  <text x="445" y="150" text-anchor="middle" class="text">Ghostty</text>
  <rect class="app" x="340" y="160" width="210" height="180" />
  <text x="445" y="180" text-anchor="middle" class="text">tmux (Prefix: C-t)</text>
  <line x1="340" y1="190" x2="550" y2="190" stroke="#666" />
  
  <text x="445" y="220" text-anchor="middle" class="text">Pane 0</text>
  <text x="445" y="240" text-anchor="middle" class="subtext">emacsclient -nw</text>
  <line x1="340" y1="260" x2="550" y2="260" stroke="#666" />
  <text x="445" y="290" text-anchor="middle" class="text">Pane 1</text>
  <text x="445" y="310" text-anchor="middle" class="subtext">CLI (zsh)</text>

  <text x="735" y="110" text-anchor="middle" class="text">Remote</text>
  <rect class="app" x="620" y="130" width="230" height="220" />
  <text x="735" y="150" text-anchor="middle" class="text">Ghostty</text>
  <rect class="app" x="630" y="160" width="210" height="180" />
  <text x="735" y="180" text-anchor="middle" class="text">SSH -> tmux</text>
  <line x1="630" y1="190" x2="840" y2="190" stroke="#666" />
  
  <text x="735" y="240" text-anchor="middle" class="text">Remote Panes</text>
  <text x="735" y="260" text-anchor="middle" class="subtext">Remote CLI / TUI</text>
</svg>
